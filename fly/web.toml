app = "lorekeeper-web"

[build]
  dockerfile = "../frontend/Dockerfile"
  [build.args]
    VITE_API_BASE = "https://lorekeeper-gateway.fly.dev/api"
    VITE_MAINTENANCE_MODE = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
